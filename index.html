<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<div class="target-url">
    Roblox XM脚本网址：<br>
    <strong>https://xm.954377.xyz</strong>
</div>

<p>如果您的浏览器没有自动跳转，请点击下面的按钮：</p>
<a href="https://xm.954377.xyz" class="redirect-link">立即跳转到 954377.xyz</a>
</div>

<script>
// 倒计时功能
let seconds = 3;
const countdownElement = document.getElementById('countdown');

const countdownInterval = setInterval(() => {
    seconds--;
    countdownElement.textContent = seconds;
    
    if (seconds <= 0) {
        clearInterval(countdownInterval);
        // 自动跳转
        window.location.href = "https://954377.xyz";
    }
}, 1000);

// 如果用户想立即跳转，可以按ESC键
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        window.location.href = "https://954377.xyz";
    }
});
</script>
</body>
</html>
